<!DOCTYPE html>
<html>
<head>
  <title>Kirjautuminen - WOREN</title>
  <style>
    body {
      font-family: Helvetica, Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      font-size: 48px;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .container {
      width: 350px;
      margin: 0 auto;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 20px 0;
    }

    h2 {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #000000;
      font-weight: normal;
      margin-bottom: 10px;
    }

    a {
      text-decoration: none;
      color: black;
      margin: 0 5px;
    }

    a:hover {
      opacity: 0.6;
    }

    form {
      background: white;
      padding: 20px;
      margin-bottom: 30px;
    }

    p {
      font-size: 15px;
      color: #000000;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    input[type="text"],
    textarea,
    input[type="file"] {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 16px;
      border: 1px solid #1a1a1a;
      border-radius: 0;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 13px;
      background: #f5f5f5;
      box-sizing: border-box;
    }

    input[type="submit"] {
      padding: 8px 14px;
      background: #1a1a1a;
      color: white;
      border: none;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 13px;
      cursor: pointer;
    }

    input[type="submit"]:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>WOREN</h1>
    <h2>Kirjaudu sisään</h2>

    {% if session.username %}
      <p>Olet kirjautunut nimellä {{ session.username }}</p>
      <a href="/logout">Kirjaudu ulos</a>
    {% else %}
      <form action="/login" method="post">
        <p>Tunnus:</p>
        <input type="text" name="username" placeholder="" required> <br>
        <p>Salasana:</p>
        <input type="password" name="password" placeholder="" required>
        <br>
        <br>
        <input type="submit" value="Kirjaudu">
      </form>

      <em><a href="/register">Luo tunnus</a></em>

      <h6><p class="about-text">
        <em><a href="/about">
          asuja ja ihmisiä
        </a></em>
      </p></h6>

    {% endif %}
  </div>

</body>
</html>
