<!DOCTYPE html>
<html>
<head>
  <title>WOREN — muokkaa</title>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: Helvetica, Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      font-size: 48px;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .container {
      width: 300px;
      margin: 0 auto;
    }

    h2 {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
      font-weight: normal;
      margin-bottom: 20px;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 20px 0;
    }

    input[type="text"],
    textarea {
      padding: 8px 12px;
      width: 100%;
      border: 1px solid #1a1a1a;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 13px;
      background: #f5f5f5;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
    }

    input[type="submit"] {
      padding: 8px 14px;
      background: #1a1a1a;
      color: white;
      border: none;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }

    label {
      font-size: 13px;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 6px;
      margin-top: 16px;
    }

    a {
      text-decoration: none;
      color: black;
      font-size: 13px;
    }

    a:hover {
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <h1>WOREN</h1>

  <div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
      <a href="/">← takaisin</a>
    </div>

    <hr>
    <h2>Muokkaa ilmoitusta</h2>

    <form action="/edit_item" method="post" enctype="multipart/form-data">
      <input type="hidden" name="id" value="{{ item.id }}" />

      <label>Otsikko</label>
      <input type="text" name="title" value="{{ item.title }}" />

      <label>Kuvaus</label>
      <textarea name="description" rows="6">{{ item.description }}</textarea>

      <label>Kuva</label>
      <input type="file" name="image" accept="image/jpeg" style="font-size: 13px;" />

      <input type="submit" value="tallenna" />
    </form>
  </div>

</body>
</html>
