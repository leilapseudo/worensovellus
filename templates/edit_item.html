<!DOCTYPE html>
<html>

<head>
  <title>Muokkaa ilmoitusta</title>
  <meta charset="UTF-8" />
</head>

<body>
  <h1>Muokkaa ilmoitusta</h1>
  <form action="/edit_item" method="post" enctype="multipart/form-data">
    <input type="hidden" name="id" value="{{ item.id }}" />
    <p>
      Otsikko: <br />
      <input type="text" name="title" value="{{ item.title }}" />
    </p>
    <p>
      Kuvaus: <br />
      <textarea name="description" rows="8" cols="60">{{ item.description }}</textarea>
    </p>
    <p>
      Kuva:<br><input type="file" name="image" accept="image/jpeg" />
    </p>
    <input type="submit" value="Tallenna    " />
  </form>
</body>
