<!DOCTYPE html>
<html>
<head>
  <title>Luo tunnus - WOREN</title> 
  <style>
    body {
      font-family: Helvetica, Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      font-size: 48px;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .container {
      width: 350px;
      margin: 0 auto;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 20px 0;
    }

    h2 {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
      font-weight: normal;
      margin-bottom: 20px;
    }

    a {
      text-decoration: none;
      color: black;
      margin: 0 10px;
    }

    a:hover {
      opacity: 0.6;
    }

    form {
      background: white;
      padding: 20px;
      margin-bottom: 30px;
    }

    p {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    input[type="text"],
    textarea,
    input[type="file"] {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 16px;
      border: 1px solid #1a1a1a;
      border-radius: 0;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 13px;
      background: #f5f5f5;
      box-sizing: border-box;
    }

    input[type="submit"] {
      padding: 8px 14px;
      background: #1a1a1a;
      color: white;
      border: none;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 13px;
      cursor: pointer;
    }

    input[type="submit"]:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WOREN</h1>
    <h2>Luo tunnus</h2>

    <form action="/create" method="post">
      <label>Tunnus:</label>
      <input type="text" name="username" required>

      <label>Salasana:</label>
      <br>
      <input type="password" name="password1" required>
      <br>
      <br>
      <label>Toista salasana:</label>
      <br>
      <input type="password" name="password2" required>

      <input type="submit" value="Luo tunnus">
    </form>

    <em><a href="/login">Kirjaudu sisään</a></em>
  </div>
</body>
</html>
