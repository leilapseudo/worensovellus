<!DOCTYPE html>
<html>
<head>
  <title>Luo tunnus - WOREN</title>
  <style>
    body {
      font-family: Helvetica, Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 400px;
      margin: 100px auto;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    form {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: left;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    input[type="submit"] {
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    a {
      display: block;
      margin-top: 20px;
      text-decoration: none;
      color: black;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WOREN</h1>
    <h2>Luo tunnus</h2>

    <form action="/create" method="post">
      <label>Tunnus:</label>
      <input type="text" name="username" required>

      <label>Salasana:</label>
      <input type="password" name="password1" required>

      <label>Toista salasana:</label>
      <input type="password" name="password2" required>

      <input type="submit" value="Luo tunnus">
    </form>

    <a href="/login">Takaisin kirjautumiseen</a>
  </div>
</body>
</html>
