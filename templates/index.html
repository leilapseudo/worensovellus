<!DOCTYPE html>
<html>
<head>
  <title>WOREN</title>
  <style>
    body {
      font-family: Helvetica, Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      font-size: 48px;
      letter-spacing: 4px;
    }

    .container {
      width: 600px;
      margin: 0 auto;
    }

    form {
      text-align: center;
      margin-bottom: 20px;
    }

    input[type="text"] {
      padding: 8px;
      width: 60%;
    }

    input[type="submit"] {
      padding: 8px 12px;
    }

    .item {
      background: white;
      padding: 20px;
      margin-bottom: 30px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }

    p {
      color: #333;
    }

    .nav {
      text-align: center;
      margin-bottom: 20px;
    }

    a {
      text-decoration: none;
      color: black;
      font-weight: bold;
      margin: 0 10px;
    }
  </style>
</head>
<body>

  <h1>WOREN</h1>

  <!-- small about link -->
  <div style="text-align: center; margin-top: -20px; margin-bottom: 30px;">
    <a href="/about" style="font-size: 12px; font-weight: bold; color: #555; text-decoration: none;">
      about
    </a>
  </div>

  <div class="container">

    <div class="nav">
      {% if session.username %}
        <p>Olet kirjautunut nimellä {{ session.username }}</p>
        <a href="/new_item">Lisää uusi asukuva</a>
        <a href="/logout">Kirjaudu ulos</a>
      {% else %}
        <a href="/login">Kirjaudu sisään</a>
        <a href="/register">Luo tunnus</a>
      {% endif %}
    </div>

    <form action="/search" method="get">
      <input type="text" name="query" placeholder="Etsi asuja..." />
      <input type="submit" value="Hae" />
    </form>

    <hr>

    <h2>Ilmoitukset</h2>

    {% for item in items %}
      <div class="item">
        <h3>{{ item.title }}</h3>
        <img src="/image/{{ item.id }}">
        <p>{{ item.description }}</p>
        <a href="/item/{{ item.id }}">View details</a>
      </div>
    {% endfor %}

  </div>

</body>
</html>
